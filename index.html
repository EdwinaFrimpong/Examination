<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edwina's Dream House - A-Frame</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <a-scene background="color: #87ceeb" renderer="antialias: true; colorManagement: true">
      <a-assets>
        <a-asset-item id="villa" src="assets/house.glb"></a-asset-item>
        <img id="grass" src="assets/grass%20copy.jpg" />
        <a-asset-item id="pool" src="assets/swimming_pool%20(2).glb"></a-asset-item>
        <a-asset-item id="palm" src="assets/date_palm.glb"></a-asset-item>
        <img id="BrickRound" src="textures/wall1.jpg" />
        <a-asset-item id="car" src="assets/car.glb"></a-asset-item>
        <a-asset-item id="car2" src="assets/car2.glb"></a-asset-item>
       

        <a-asset-item id="gate" src="assets/iron_gate.glb"></a-asset-item>
        <img id="sky" src="assets/sky.jpg" />
      </a-assets>

      <a-sky src="#sky" rotation="0 -90 0"></a-sky>

      <!-- Lighting -->
      <a-entity light="type: ambient; color: #ffffff; intensity: 0.6"></a-entity>
      <a-entity light="type: directional; color: #fff7e6; intensity: 0.6" position="-5 10 5"></a-entity>

      <!-- Villa & exterior models -->
      <a-entity id="villa-model" gltf-model="#villa" position="3 0.3 5" rotation="1 -90 0" scale="0.8 0.8 0.8"></a-entity>

      <!-- Perimeter wall enclosing the villa, grass and palms; opening for the gate at z=8 -->
      <a-entity id="perimeter-wall">
         <!-- Back wall -->
         <a-box position="0 2.5 -18" width="33" height="5" depth="0.3"
           material="src: #BrickRound; repeat: 12 4; side: double; roughness: 1; metalness: 0"></a-box>
         <!-- Left wall -->
         <a-box position="-16.5 2.5 3" width="0.3" height="5" depth="44.5"
           material="src: #BrickRound; repeat: 2 12; side: double; roughness: 1; metalness: 0"></a-box>
         <!-- Right wall -->
         <a-box position="16.5 2.5 3" width="0.3" height="5" depth="44.5"
           material="src: #BrickRound; repeat: 2 12; side: double; roughness: 1; metalness: 0"></a-box>
         <!-- Front wall segments (gap for gate centered at x=0,z=8) -->
         <a-box position="-13 2.5 25" width="7" height="5" depth="0.3"
           material="src: #BrickRound; repeat: 3 4; side: double; roughness: 1; metalness: 0"></a-box>
         <a-box position="13 2.5 25" width="7" height="5" depth="0.3"
           material="src: #BrickRound; repeat: 3 4; side: double; roughness: 1; metalness: 0"></a-box>
      </a-entity>

      <!--<a-entity id="pool-model" gltf-model="#pool" position="6 1 4" rotation="0 90 0" scale="1.1 1.1 1.1" optimize-gltf static-body="shape: box">
        Water plane placed as a child of the pool model so it sits inside the pool geometry -->
        <a-plane id="water" position="1 0.28 8.7" rotation="-90 0 0" width="6" height="5"
                 material="shader: standard; color: #2aa6e0; side: double; transparent: true; opacity: 0.9; roughness: 0.2; metalness: 0"
                 pool-water water-volume="width: 6; depth: 3; surfaceY: 0.12"></a-plane>
    


      <!-- Decorations and plants -->
      <a-entity gltf-model="#palm" position="-3.71 0 2.5" rotation="0 -30 0" scale="0.7 0.7 0.7" class="decor"></a-entity>

      <!-- Ten palms placed in a ring around the villa -->
      <a-entity gltf-model="#palm" position="8.71 0 4" rotation="0 90 0" scale="0.6 0.6 0.6" class="decor"></a-entity>
      <a-entity gltf-model="#palm" position="-3.71 0 4" rotation="0 45 0" scale="0.5 0.5 0.5" class="decor"></a-entity>
      <a-entity gltf-model="#palm" position="8.71 0 6" rotation="0 20 0" scale="0.5 0.5 0.5" class="decor"></a-entity>
      <a-entity gltf-model="#palm" position="-3.71 0 6" rotation="0 -20 0" scale="0.5 0.5 0.5" class="decor"></a-entity>
      <a-entity gltf-model="#palm" position="8.71 0 3.06" rotation="0 -45 0" scale="0.5 0.5 0.5" class="decor"></a-entity>


      <!-- Vehicles & gate (car positioned in front of villa) -->
      <a-entity gltf-model="#car" position="-8 0 10" rotation="0 -180 0" scale="0.3 0.3 0.3" class="decor"></a-entity>
      <a-entity gltf-model="#car2" position="-13 0.12 6" rotation="0 -360 0" scale="1 1 1" class="decor"></a-entity>

      <!-- Gate moved to the front opening at z=8 to match perimeter wall -->
      <a-entity gltf-model="#gate" position="0 2.8 25" rotation="0 360 0" scale="0.9 0.5 0.5" class="decor"></a-entity>

      <!-- Simple pet (animated) - moved to garden area -->
      <a-sphere position="1 0.4 9" radius="0.25" color="#b5651d" pet-bob dynamic-body buoyant></a-sphere>

      <!-- removed plain color ground plane to avoid z-fighting with grass texture -->

      <!-- Camera + controls (moved back to avoid being inside objects) -->
      <a-entity id="cameraRig" position="0 1.6 20">
        <a-entity camera look-controls="pointerLockEnabled: true" wasd-controls="acceleration: 20" position="0 0 0" rotation="0 0 0">
          <a-entity cursor="fuse: false; rayOrigin: mouse" raycaster="objects: .interactable"></a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="sun" light="type: directional; color: #fff; intensity: 0.8" position="-10 20 10"></a-entity>

      <!-- environment removed to avoid low-poly ground obscuring scene -->

       <a-plane src="#grass"
         rotation="-90 0 0"
         position="0 0x 0"
         width="90"
         height="80"
         material="src: #grass; side: double; repeat: 8 8; roughness: 1; metalness: 0"></a-plane>

      <a-entity id="loadingOverlay" visible="false"></a-entity>
    </a-scene>

    <div id="overlay">Loading scene…</div>

    <script src="https://unpkg.com/aframe-environment-component@1.3.1/dist/aframe-environment-component.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
    <script src="js/main.js"></script>
    <script>
      // Simple overlay to show loading and runtime errors
      const overlay = document.getElementById('overlay');
      function hideOverlay() { overlay.style.display = 'none'; }
      function showOverlay(msg) { overlay.style.display = 'block'; overlay.textContent = msg; }

      window.addEventListener('load', () => {
        // Hide overlay shortly after load to allow GLB fetches to proceed
        setTimeout(hideOverlay, 1200);
      });

      window.addEventListener('error', (e) => {
        showOverlay('Error: ' + (e.message || e.type));
        console.error(e.error || e.message || e);
      });

      // If WebGL is unavailable, show message
      if (!window.WebGLRenderingContext) {
        showOverlay('WebGL not supported in this browser.');
      }
    </script>
  </body>
</html>
